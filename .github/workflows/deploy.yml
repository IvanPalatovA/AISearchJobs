name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      ENV_FILE: ${{ secrets.ENV_FILE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          test -n "$SERVER_HOST" || { echo "SERVER_HOST secret is empty"; exit 1; }
          test -n "$SERVER_USER" || { echo "SERVER_USER secret is empty"; exit 1; }
          test -n "$SERVER_SSH_KEY" || { echo "SERVER_SSH_KEY secret is empty"; exit 1; }
          test "$SERVER_USER" = "root" || { echo "SERVER_USER must be root (current: $SERVER_USER)"; exit 1; }

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$SERVER_SSH_KEY" | sed 's/\r$//' > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keygen -y -f "$HOME/.ssh/deploy_key" >/dev/null

          echo "Deploy key fingerprint:"
          ssh-keygen -lf "$HOME/.ssh/deploy_key"

          ssh-keyscan -T 10 -H "$SERVER_HOST" >> "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

          DEPLOY_TARGET="${SERVER_USER}@${SERVER_HOST}"
          SSH_BASE=(ssh -i "$HOME/.ssh/deploy_key" -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new)

          echo "DEPLOY_TARGET=${DEPLOY_TARGET}" >> "$GITHUB_ENV"
          echo "RSYNC_RSH=ssh -i ${HOME}/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" >> "$GITHUB_ENV"

          "${SSH_BASE[@]}" "$DEPLOY_TARGET" "echo deploy ssh ok"

      - name: Sync files
        run: |
          ssh -i "$HOME/.ssh/deploy_key" -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            "$DEPLOY_TARGET" \
            "command -v rsync >/dev/null || (apt-get update && apt-get install -y rsync)"

          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.venv' \
            --exclude '.env' \
            --exclude '.pytest_cache' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.DS_Store' \
            --exclude 'AI_Vacancy_Match_Agent/data' \
            --exclude 'AI_Vacancy_Match_Agent/output' \
            --exclude 'AI_Vacancy_Match_Agent/*.csv' \
            --exclude 'AI_Vacancy_Match_Agent/*.json' \
            -e "$RSYNC_RSH" \
            ./ "$DEPLOY_TARGET:/home/app/AISearchJob/"

      - name: Update env file
        if: ${{ env.ENV_FILE != '' }}
        run: |
          printf '%s\n' "$ENV_FILE" | ssh -i "$HOME/.ssh/deploy_key" -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            "$DEPLOY_TARGET" \
            "cat > /home/app/AISearchJob/AI_Vacancy_Match_Agent/.env && chown app:app /home/app/AISearchJob/AI_Vacancy_Match_Agent/.env && chmod 600 /home/app/AISearchJob/AI_Vacancy_Match_Agent/.env"

      - name: Restart app
        run: |
          ssh -i "$HOME/.ssh/deploy_key" -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            "$DEPLOY_TARGET" <<'EOF'
          set -euo pipefail

          cd /home/app/AISearchJob/AI_Vacancy_Match_Agent
          mkdir -p data/collected data/criteria data/filters output

          if [ ! -d .venv ]; then
            python3 -m venv .venv
          fi

          .venv/bin/python -m pip install --upgrade pip

          if [ -s requirements.txt ]; then
            .venv/bin/pip install -r requirements.txt
          fi

          chown -R app:app /home/app/AISearchJob
          install -m 0644 /home/app/AISearchJob/deploy/superjobsearch.service /etc/systemd/system/superjobsearch.service
          systemctl daemon-reload
          systemctl enable superjobsearch
          systemctl restart superjobsearch
          systemctl is-active --quiet superjobsearch
          EOF
