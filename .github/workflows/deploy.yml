name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      ENV_FILE: ${{ secrets.ENV_FILE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          test -n "$SERVER_HOST" || { echo "SERVER_HOST secret is empty"; exit 1; }
          test -n "$SERVER_USER" || { echo "SERVER_USER secret is empty"; exit 1; }
          test -n "$SERVER_SSH_KEY" || { echo "SERVER_SSH_KEY secret is empty"; exit 1; }

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" | sed 's/\r$//' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null
          echo "Deploy key fingerprint:"
          ssh-keygen -lf ~/.ssh/deploy_key
          echo "Connecting as user: ${SERVER_USER}"
          echo "Offering public key:"
          ssh-keygen -y -f ~/.ssh/deploy_key

          if [ "${SERVER_USER}" != "root" ]; then
            echo "::error::SERVER_USER must be 'root' (current: ${SERVER_USER}). Deploy uses root + sudo."
            exit 1
          fi

          ssh-keyscan -T 10 -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          {
            echo "Host deploy-target"
            echo "  HostName ${SERVER_HOST}"
            echo "  User ${SERVER_USER}"
            echo "  IdentityFile ~/.ssh/deploy_key"
            echo "  IdentitiesOnly yes"
            echo "  PubkeyAuthentication yes"
            echo "  PreferredAuthentications publickey"
            echo "  StrictHostKeyChecking accept-new"
          } >> ~/.ssh/config
          chmod 600 ~/.ssh/config

          ssh deploy-target "echo deploy ssh ok" || {
            echo "::error::SSH login failed."
            echo "Run on server console: bash -c 'curl -sL ...' OR paste deploy/fix-ssh-deploy.sh"
            ssh -vvv deploy-target "echo deploy ssh ok" 2>&1 | tail -40 || true
            exit 1
          }

      - name: Sync files
        run: |
          ssh deploy-target \
            "command -v rsync >/dev/null || (sudo apt-get update && sudo apt-get install -y rsync)"

          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.venv' \
            --exclude '.env' \
            --exclude '.pytest_cache' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.DS_Store' \
            --exclude 'AI_Vacancy_Match_Agent/data' \
            --exclude 'AI_Vacancy_Match_Agent/output' \
            --exclude 'AI_Vacancy_Match_Agent/*.csv' \
            --exclude 'AI_Vacancy_Match_Agent/*.json' \
            -e "ssh -F ~/.ssh/config deploy-target" \
            ./ deploy-target:/home/app/AISearchJob/

      - name: Update env file
        if: ${{ env.ENV_FILE != '' }}
        run: |
          printf '%s\n' "$ENV_FILE" | ssh deploy-target \
            "cat > /home/app/AISearchJob/AI_Vacancy_Match_Agent/.env && chown app:app /home/app/AISearchJob/AI_Vacancy_Match_Agent/.env && chmod 600 /home/app/AISearchJob/AI_Vacancy_Match_Agent/.env"

      - name: Restart app
        run: |
          ssh deploy-target <<'EOF'
          set -euo pipefail

          cd /home/app/AISearchJob/AI_Vacancy_Match_Agent
          mkdir -p data/collected data/criteria data/filters output

          if [ ! -d .venv ]; then
            python3 -m venv .venv
          fi

          .venv/bin/python -m pip install --upgrade pip

          if [ -s requirements.txt ]; then
            .venv/bin/pip install -r requirements.txt
          fi

          chown -R app:app /home/app/AISearchJob
          sudo install -m 0644 /home/app/AISearchJob/deploy/superjobsearch.service /etc/systemd/system/superjobsearch.service
          sudo systemctl daemon-reload
          sudo systemctl enable superjobsearch
          sudo systemctl restart superjobsearch
          sudo systemctl is-active --quiet superjobsearch
          EOF
